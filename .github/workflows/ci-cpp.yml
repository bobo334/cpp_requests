name: C++ CI

on:
  push:
    branches: [main, master]
    paths:
      - 'requests_cpp/**'
      - '.github/workflows/ci-cpp.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'requests_cpp/**'
      - '.github/workflows/ci-cpp.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        working-directory: requests_cpp
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: requests_cpp
        run: cmake --build build --config Release --parallel

      - name: Test Examples
        working-directory: requests_cpp
        run: |
          $env:PATH = "build\Release;$env:PATH"
          if (Test-Path "build\Release\decode_chain_smoke.exe") {
            build\Release\decode_chain_smoke.exe
          }

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        compiler: [gcc, clang]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Configure (GCC)
        if: matrix.compiler == 'gcc'
        working-directory: requests_cpp
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++

      - name: Configure (Clang)
        if: matrix.compiler == 'clang'
        working-directory: requests_cpp
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        working-directory: requests_cpp
        run: cmake --build build --config Release --parallel

      - name: Test Examples
        working-directory: requests_cpp
        run: |
          chmod +x build/decode_chain_smoke || true
          ./build/decode_chain_smoke || echo "Example not built as executable"

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure
        working-directory: requests_cpp
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: requests_cpp
        run: cmake --build build --config Release --parallel

      - name: Test Examples
        working-directory: requests_cpp
        run: |
          chmod +x build/decode_chain_smoke || true
          ./build/decode_chain_smoke || echo "Example not built as executable"

  build-summary:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    if: always()

    steps:
      - name: Check build results
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | ${{ needs.build-windows.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux (GCC) | ${{ needs.build-linux.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | ${{ needs.build-macos.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
