name: C++ Lint

on:
  push:
    branches: [main, master]
    paths:
      - 'requests_cpp/**'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'requests_cpp/**'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clang-tidy:
    name: Clang-Tidy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          submodules: recursive

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cmake build-essential

      - name: Configure CMake
        working-directory: requests_cpp
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        working-directory: requests_cpp
        run: |
          echo "Running clang-tidy on source files..."
          find src -name '*.cpp' | head -20 | while read file; do
            echo "Checking: $file"
            clang-tidy -p build "$file" --warnings-as-errors='*' || true
          done

  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          submodules: recursive

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        working-directory: requests_cpp
        run: |
          echo "Running cppcheck on source files..."
          cppcheck --version
          cppcheck \
            --enable=all \
            --std=c++17 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --error-exitcode=1 \
            --inline-suppr \
            -I include \
            -I third_party \
            src/ \
            2>&1 | tee cppcheck-report.txt || true

      - name: Upload cppcheck report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: cppcheck-report
          path: requests_cpp/cppcheck-report.txt
          retention-days: 7

  format-check:
    name: Format Check (clang-format)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          submodules: recursive

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check code format
        working-directory: requests_cpp
        run: |
          echo "Checking code formatting..."
          find include src -name '*.hpp' -o -name '*.cpp' | while read file; do
            if ! clang-format --dry-run --Werror "$file" 2>/dev/null; then
              echo "Format error in: $file"
            fi
          done || echo "Format check completed"
